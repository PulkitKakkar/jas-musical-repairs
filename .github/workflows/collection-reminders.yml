name: Customer reminders

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  send-customer-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger repair collection reminders
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://main.d3nbquzzxxolms.amplifyapp.com/api/reminders/collection?limit=10
      - name: Trigger hire return reminders
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://main.d3nbquzzxxolms.amplifyapp.com/api/reminders/hires?limit=10
