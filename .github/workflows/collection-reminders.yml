name: Collection reminders

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  send-collection-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder job
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://main.d3nbquzzxxolms.amplifyapp.com/api/reminders/collection
