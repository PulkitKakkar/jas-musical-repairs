version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci
    build:
      commands:
        - test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
        - test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY" && exit 1)
        - printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$NEXT_PUBLIC_SUPABASE_URL" >> .env.production
        - printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_ANON_KEY" >> .env.production
        - test -z "$TWILIO_ACCOUNT_SID" || printf 'TWILIO_ACCOUNT_SID=%s\n' "$TWILIO_ACCOUNT_SID" >> .env.production
        - test -z "$TWILIO_AUTH_TOKEN" || printf 'TWILIO_AUTH_TOKEN=%s\n' "$TWILIO_AUTH_TOKEN" >> .env.production
        - test -z "$TWILIO_PHONE_NUMBER" || printf 'TWILIO_PHONE_NUMBER=%s\n' "$TWILIO_PHONE_NUMBER" >> .env.production
        - test -z "$RESEND_API_KEY" || printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY" >> .env.production
        - test -z "$EMAIL_FROM" || printf 'EMAIL_FROM=%s\n' "$EMAIL_FROM" >> .env.production
        - test -z "$JAS_CONTACT_NUMBER" || printf 'JAS_CONTACT_NUMBER=%s\n' "$JAS_CONTACT_NUMBER" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
