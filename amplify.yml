version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm ci
    build:
      commands:
        - env | grep -e '^NEXT_PUBLIC_SUPABASE_URL=' -e '^NEXT_PUBLIC_SUPABASE_ANON_KEY=' -e '^NEXT_PUBLIC_APP_URL=' >> .env.production
        - env | grep -e '^TWILIO_ACCOUNT_SID=' -e '^TWILIO_AUTH_TOKEN=' -e '^TWILIO_PHONE_NUMBER=' >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
